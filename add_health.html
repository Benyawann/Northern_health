<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เพิ่มข้อมูลธรรมนูญสุขภาพ</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="css/add_style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
</head>
<body>
  <div class="page-container">
    
    <!-- Header -->
    <div class="page-header">
      <a href="index.html" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 3L5 7L9 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        กลับไปหน้าหลัก
      </a>
      <div>
        <h1 class="page-title">เพิ่มข้อมูลธรรมนูญสุขภาพ</h1>
      </div>
    </div>
    
    <!-- Form Card -->
    <div class="form-card">
      <form id="add-charter-form" onsubmit="handleSubmit(event)">
        
        <!-- Section 1: ข้อมูลพื้นฐาน -->
        <div class="form-section">
          <h2 class="section-title">ข้อมูลพื้นฐาน</h2>
          
          <div class="form-row full">
            <div class="form-group">
              <label>ชื่อธรรมนูญสุขภาพ <span class="required">*</span></label>
              <input type="text" id="charter-name" placeholder="เช่น ธรรมนูญสุขภาพตำบลแม่เหียะ" required>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>จังหวัด <span class="required">*</span></label>
              <select id="province" required onchange="populateDistricts()">
                <option value="">เลือกจังหวัด</option>
                <option value="เชียงใหม่">เชียงใหม่</option>
                <option value="เชียงราย">เชียงราย</option>
                <option value="ลำปาง">ลำปาง</option>
                <option value="ลำพูน">ลำพูน</option>
                <option value="แม่ฮ่องสอน">แม่ฮ่องสอน</option>
                <option value="พะเยา">พะเยา</option>
                <option value="แพร่">แพร่</option>
                <option value="น่าน">น่าน</option>
                <option value="อุตรดิตถ์">อุตรดิตถ์</option>
                <option value="ตาก">ตาก</option>
                <option value="สุโขทัย">สุโขทัย</option>
                <option value="พิษณุโลก">พิษณุโลก</option>
                <option value="เพชรบูรณ์">เพชรบูรณ์</option>
                <option value="กำแพงเพชร">กำแพงเพชร</option>
                <option value="พิจิตร">พิจิตร</option>
                <option value="นครสวรรค์">นครสวรรค์</option>
                <option value="อุทัยธานี">อุทัยธานี</option>
                <option value="ชัยนาท">ชัยนาท</option>
              </select>
            </div>
            
            <div class="form-group">
              <label>อำเภอ <span class="required">*</span></label>
              <select id="district" required onchange="populateSubdistricts()">
                <option value="">เลือกอำเภอ</option>
              </select>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>ตำบล <span class="required">*</span></label>
              <select id="subdistrict" required>
                <option value="">เลือกตำบล</option>
              </select>
            </div>
            
            <div class="form-group">
              <label>ประเด็นหลัก <span class="required">*</span></label>
              <select id="title" required>
                <option value="">เลือกประเด็น</option>
                <option value="สุขภาพดี สูงดีสมส่วน">สุขภาพดี สูงดีสมส่วน</option>
                <option value="ผู้สูงอายุมีคุณภาพ">ผู้สูงอายุมีคุณภาพ</option>
                <option value="อาหารสุขภาพ ปลอดภัย">อาหารสุขภาพ ปลอดภัย</option>
                <option value="ตายดี มาตรา 12">ตายดี มาตรา 12</option>
                <option value="สุขภาพจิตชุมชน">สุขภาพจิตชุมชน</option>
                <option value="กลุ่มเปราะบาง">กลุ่มเปราะบาง</option>
                <option value="LTC ดูแลระยะยาว">LTC ดูแลระยะยาว</option>
                <option value="อื่นๆ">อื่นๆ</option>
              </select>
            </div>
          </div>
        </div>
        
        <!-- Section 2: รายละเอียดเพิ่มเติม -->
        <div class="form-section">
          <h2 class="section-title">รายละเอียดเพิ่มเติม</h2>
          
          <div class="form-row">
            <div class="form-group">
              <label>วันที่เผยแพร่</label>
              <input type="text" id="publish-date" placeholder="เช่น 15 สิงหาคม 2565">
              <div class="form-hint">รูปแบบ: วัน เดือน ปี (เช่น 1 สิงหาคม 2565)</div>
            </div>
            
            <div class="form-group">
              <label>แกนนำพัฒนาธรรมนูญ</label>
              <input type="text" id="leader" placeholder="ชื่อ-สกุล ผู้ประสานงาน">
            </div>
          </div>
          
          <div class="form-row full">
            <div class="form-group">
              <label>ผู้สนับสนุนวิชาการ</label>
              <input type="text" id="academic-supporter" placeholder="ชื่อหน่วยงาน/บุคคล">
            </div>
          </div>
        </div>
        
        <!-- Section 3: ไฟล์แนบ -->
        <div class="form-section">
          <h2 class="section-title">ไฟล์แนบ (Optional)</h2>
          
          <div class="form-row">
            <div class="form-group">
              <label>ลิงก์ไฟล์ PDF</label>
              <input type="url" id="pdf-url" placeholder="https://.../charter.pdf">
              <div class="form-hint">ลิงก์โดยตรงไปยังไฟล์ PDF</div>
            </div>
            
            <div class="form-group">
              <label>ลิงก์รูปภาพ</label>
              <input type="url" id="image-url" placeholder="https://.../image.jpg">
              <div class="form-hint">ลิงก์รูปภาพปกธรรมนูญ</div>
            </div>
          </div>
          
          <!-- File Upload Demo (จำลอง) -->
          <div class="form-row full">
            <div class="form-group">
              <label>อัปโหลดไฟล์ (Demo - ยังไม่ใช้งานจริง)</label>
              <label class="file-upload" style="pointer-events: none; opacity: 0.6;">
                <input type="file" accept=".pdf,.jpg,.jpeg,.png" disabled>
                <div class="file-upload-icon">📁</div>
                <div class="file-upload-text">คลิกเพื่อเลือกไฟล์ <span>(Demo)</span></div>
              </label>
            </div>
          </div>
        </div>
        
        <!-- Actions -->
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">
            ยกเลิก
          </button>
          <button type="submit" class="btn btn-primary" id="submit-btn">
            บันทึกข้อมูล
          </button>
        </div>
        
      </form>
    </div>
    
  </div>
  
  <!-- Toast Notification -->
  <div id="toast-notification">
    <div style="display:flex;align-items:flex-start;gap:12px;">
      <div id="toast-icon" style="width:32px;height:32px;border-radius:50%;background:#E1F5EE;color:#1D9E75;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">✓</div>
      <div style="flex:1;min-width:0;">
        <div id="toast-title" style="font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:4px;">สำเร็จ</div>
        <div id="toast-message" style="font-size:12px;color:#666;line-height:1.4;">ดำเนินการเรียบร้อยแล้ว</div>
      </div>
      <button onclick="hideToast()" style="border:none;background:none;color:#aaa;cursor:pointer;font-size:18px;line-height:1;padding:0 4px;">✕</button>
    </div>
  </div>
  
  <!-- JavaScript -->
  <script>
    // ========== Supabase Configuration ==========
    const SUPABASE_URL = 'https://zfnualnoorhtdkrqwjpa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmbnVhbG5vb3JodGRrcnF3anBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDkyNzEsImV4cCI6MjA5MDQyNTI3MX0._XuqPMrt9_Rx5aFybAqrxmKrlnU5g4JzKKz3aK2SORg';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ========== District/Subdistrict Data (Demo) ==========
    const DISTRICTS = {
      'เชียงใหม่': ['เมืองเชียงใหม่', 'จอมทอง', 'แม่แจ่ม', 'เชียงดาว', 'ดอยสะเก็ด', 'แม่แตง', 'แม่ริม', 'สะเมิง', 'ฝาง', 'แม่อาย', 'พร้าว', 'สันป่าตอง', 'สันกำแพง', 'สันทราย', 'หางดง', 'ฮอด', 'ดอยเต่า', 'อมก๋อย', 'สารภี', 'เวียงแหง', 'ไชยปราการ', 'แม่วาง', 'แม่ออน', 'ดอยหล่อ', 'กัลยาณิวัฒนา'],
      'เชียงราย': ['เมืองเชียงราย', 'เวียงชัย', 'เชียงของ', 'เทิง', 'พาน', 'ป่าแดด', 'แม่จัน', 'เชียงแสน', 'แม่สาย', 'แม่สรวย', 'เวียงป่าเป้า', 'พญาเม็งราย', 'เวียงแก่น', 'ขุนตาล', 'แม่ฟ้าหลวง', 'แม่ลาว', 'เวียงเชียงรุ้ง', 'ดอยหลวง'],
      // ... เพิ่มจังหวัดอื่นๆ ตามต้องการ
    };
    
    const SUBDISTRICTS = {
      'เมืองเชียงใหม่': ['ศรีภูมิ', 'พระสิงห์', 'หายยา', 'ช่างม่อย', 'ช้างคลาน', 'วัดเกต', 'ช้างเผือก', 'สุเทพ', 'แม่เหียะ', 'ป่าแดด', 'หนองหอย', 'ท่าศาลา', 'หนองป่าครั่ง', 'ฟ้าฮ่าม', 'ป่าตัน', 'สันผีเสื้อ'],
      'จอมทอง': ['จอมทอง', 'บ้านหลวง', 'สบเตี๊ยะ', 'ช่างเคิ่ง', 'แม่สอย', 'สบอาบ', 'ดอยแก้ว', 'บ้านแปะ'],
      // ... เพิ่มตำบลอื่นๆ ตามต้องการ
    };
    
    // ========== Toast Functions ==========
    function showToast(title, message, type = 'success', duration = 3000) {
      const toast = document.getElementById('toast-notification');
      const icon = document.getElementById('toast-icon');
      const toastTitle = document.getElementById('toast-title');
      const toastMessage = document.getElementById('toast-message');
      
      const styles = {
        success: { bg: '#E1F5EE', color: '#1D9E75', border: '#1D9E75', icon: '✓' },
        error: { bg: '#FCEBEB', color: '#E24B4A', border: '#E24B4A', icon: '✕' },
        info: { bg: '#E6F1FB', color: '#378ADD', border: '#378ADD', icon: 'ℹ' }
      };
      
      const style = styles[type] || styles.success;
      
      toastTitle.textContent = title;
      toastMessage.textContent = message;
      icon.textContent = style.icon;
      icon.style.background = style.bg;
      icon.style.color = style.color;
      toast.style.borderLeftColor = style.border;
      
      toast.classList.remove('hide');
      toast.style.display = 'block';
      
      setTimeout(() => hideToast(), duration);
    }
    
    function hideToast() {
      const toast = document.getElementById('toast-notification');
      if (!toast) return;
      toast.classList.add('hide');
      setTimeout(() => {
        toast.style.display = 'none';
        toast.classList.remove('hide');
      }, 300);
    }
    
    // ========== Dynamic Dropdowns ==========
    function populateDistricts() {
      const province = document.getElementById('province').value;
      const districtSelect = document.getElementById('district');
      const subdistrictSelect = document.getElementById('subdistrict');
      
      // รีเซ็ตอำเภอและตำบล
      districtSelect.innerHTML = '<option value="">เลือกอำเภอ</option>';
      subdistrictSelect.innerHTML = '<option value="">เลือกตำบล</option>';
      
      if (province && DISTRICTS[province]) {
        DISTRICTS[province].forEach(district => {
          const option = document.createElement('option');
          option.value = district;
          option.textContent = district;
          districtSelect.appendChild(option);
        });
      }
    }
    
    function populateSubdistricts() {
      const district = document.getElementById('district').value;
      const subdistrictSelect = document.getElementById('subdistrict');
      
      subdistrictSelect.innerHTML = '<option value="">เลือกตำบล</option>';
      
      if (district && SUBDISTRICTS[district]) {
        SUBDISTRICTS[district].forEach(sub => {
          const option = document.createElement('option');
          option.value = sub;
          option.textContent = sub;
          subdistrictSelect.appendChild(option);
        });
      }
    }
    
    // ========== Form Submit ==========
    async function handleSubmit(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submit-btn');
      
      // Validate
      const charterName = document.getElementById('charter-name').value.trim();
      const province = document.getElementById('province').value;
      const district = document.getElementById('district').value;
      const subdistrict = document.getElementById('subdistrict').value;
      const title = document.getElementById('title').value;
      
      if (!charterName || !province || !district || !subdistrict || !title) {
        showToast('❌ กรุณากรอกข้อมูล', 'กรุณากรอกข้อมูลที่มีเครื่องหมาย * ให้ครบถ้วน', 'error');
        return;
      }
      
      // Show loading
      submitBtn.disabled = true;
      submitBtn.classList.add('btn-loading');
      submitBtn.textContent = 'กำลังบันทึก...';
      
      try {
        // ✅ Prepare data for Supabase
        const newCharter = {
          charter_name: charterName,
          province: province,
          district: district,
          subdistrict: subdistrict,
          title: title,
          publish_date: document.getElementById('publish-date').value.trim() || null,
          leader: document.getElementById('leader').value.trim() || null,
          academic_supporter: document.getElementById('academic-supporter').value.trim() || null,
          pdf_url: document.getElementById('pdf-url').value.trim() || null,
          image_url: document.getElementById('image-url').value.trim() || null,
          created_at: new Date().toISOString()
        };
        
        console.log('📤 Inserting data:', newCharter);
        
        // ✅ Insert to Supabase
        const { data, error } = await supabase
          .from('data_charter')
          .insert([newCharter])
          .select();
        
        if (error) throw error;
        
        // ✅ Success
        console.log('✅ Data inserted:', data);
        showToast('✅ บันทึกสำเร็จ', `เพิ่มข้อมูล "${charterName}" เรียบร้อยแล้ว`, 'success', 3000);
        
        // Reset form after delay
        setTimeout(() => {
          document.getElementById('add-charter-form').reset();
          submitBtn.disabled = false;
          submitBtn.classList.remove('btn-loading');
          submitBtn.textContent = '💾 บันทึกข้อมูล';
          
          // Redirect to main page after success
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        }, 1000);
        
      } catch (err) {
        console.error('❌ Insert failed:', err);
        showToast('❌ บันทึกไม่สำเร็จ', err.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่', 'error', 5000);
        
        // Reset button
        submitBtn.disabled = false;
        submitBtn.classList.remove('btn-loading');
        submitBtn.textContent = '💾 บันทึกข้อมูล';
      }
    }
    
    // ========== Initialize ==========
    document.addEventListener('DOMContentLoaded', () => {
      console.log('🚀 Add Charter page loaded');
      
      // Check auth (optional)
      const userStr = localStorage.getItem('user');
      if (!userStr) {
        // Uncomment to require login:
        // showToast('⚠️ ต้องล็อกอิน', 'กรุณาเข้าสู่ระบบเพื่อเพิ่มข้อมูล', 'info', 3000);
        // setTimeout(() => window.location.href = 'login.html', 2000);
      }
    });
  </script>
    <!-- ✅ ปุ่มเลื่อนขึ้นบน -->
  <button id="scroll-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="เลื่อนขึ้นบน">
    ↑
  </button>
  
  <script>
    // ✅ แสดง/ซ่อนปุ่มเลื่อนขึ้นบนตามการสกรอล
    window.addEventListener('scroll', () => {
      const btn = document.getElementById('scroll-to-top');
      if (btn) {
        if (window.scrollY > 300) {
          btn.classList.add('show');
        } else {
          btn.classList.remove('show');
        }
      }
    });
    
    // ✅ ปิด modal toast เมื่อกด ESC
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        hideToast();
      }
    });
  </script>
</body>
</html>
