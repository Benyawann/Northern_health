name: 💾 Supabase Database Backup

on:
  schedule:
    - cron: '0 1 * * *'  # ทุกวัน เวลา 01:00 UTC (08:00 น. ไทย)
  workflow_dispatch:       # สั่งรันด้วยตนเองได้

jobs:
  backup:
    name: Backup Supabase DB
    runs-on: ubuntu-latest

    # ต้องการสิทธิ์เขียน repo สำหรับ commit ไฟล์ backup
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: 💾 Dump Database (Schema + Data)
        run: |
          mkdir -p backups/$(date +%Y-%m)
          FILENAME="backups/$(date +%Y-%m)/backup_$(date +%Y%m%d_%H%M%S).sql"
          supabase db dump \
            --db-url "${{ secrets.SUPABASE_DB_URL }}" \
            -f "$FILENAME"
          echo "✅ Backup saved to $FILENAME"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 📤 Commit backup to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "💾 Auto backup: $(date +%Y-%m-%d)"
          file_pattern: 'backups/**'