name: 🚀 Deploy Supabase Migrations

on:
  push:
    branches:
      - main          # push ไป main → deploy production
    paths:
      - 'supabase/**' # trigger เฉพาะเมื่อมีการเปลี่ยนแปลงใน supabase/
  workflow_dispatch:  # สั่ง deploy ด้วยตนเองได้จาก GitHub UI

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout โค้ด
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. ติดตั้ง Supabase CLI
      - name: 🔧 Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      # 3. Link project และ deploy migrations
      - name: 🔗 Link Supabase Project
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 4. Push database migrations
      - name: 🗄️ Push Database Migrations
        run: |
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}